name = "insureconnect-hub"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "insureconnect-d1"
database_id = "393ee8c3-8561-42d5-816b-9215972b693b"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "insureconnect-storage"

[vars]
# 일반 환경변수 (시크릿은 wrangler pages secret put 으로 별도 등록)
DIGEST_SEND_ENABLED = "1"
