<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>InsureConnect — 캐시·SW 초기화</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:linear-gradient(135deg,#f0f5ff 0%,#e6efff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#080f30}
    .box{background:#fff;border-radius:16px;padding:32px 28px;box-shadow:0 12px 40px rgba(12,31,184,0.12);max-width:480px;width:100%}
    h1{font-size:20px;font-weight:800;margin-bottom:8px;color:#1a3de8}
    p{font-size:14px;line-height:1.65;color:#3d5080;margin-bottom:16px}
    .status{background:#f0f5ff;border:1px solid rgba(26,61,232,0.15);border-radius:10px;padding:12px 14px;font-size:13px;color:#3d5080;line-height:1.7;font-family:ui-monospace,monospace;white-space:pre-wrap;margin:14px 0;max-height:280px;overflow-y:auto}
    .status .ok{color:#059669;font-weight:700}
    .status .err{color:#dc2626;font-weight:700}
    button{display:block;width:100%;padding:12px 18px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s,background .15s;margin-top:10px}
    .btn-primary{background:#1a3de8;color:#fff}
    .btn-primary:hover{background:#0c1fb8;transform:translateY(-1px)}
    .btn-link{background:transparent;color:#1a3de8;border:1.5px solid rgba(26,61,232,0.25)}
    .btn-link:hover{background:rgba(26,61,232,0.05)}
    .ic-emoji{font-size:48px;text-align:center;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="box">
    <div class="ic-emoji">🧹</div>
    <h1>InsureConnect 초기화</h1>
    <p>옛 Service Worker와 캐시 데이터를 모두 정리합니다. <strong>한 번이면 끝</strong>이에요. 초기화가 끝나면 자동으로 메인 페이지로 이동합니다.</p>
    <div class="status" id="log">대기 중…</div>
    <button class="btn-primary" id="run-btn" onclick="runReset()">🧹 지금 초기화 시작</button>
    <button class="btn-link" onclick="location.href='/'">메인 페이지로 이동</button>
  </div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const t = new Date();
      const ts = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
      const span = cls ? `<span class="${cls}">${msg}</span>` : msg;
      logEl.innerHTML += `[${ts}] ${span}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function runReset() {
      const btn = document.getElementById('run-btn');
      btn.disabled = true; btn.textContent = '⏳ 처리 중…';
      logEl.innerHTML = '';

      log('초기화 시작');

      // 1) Service Worker 등록 모두 해제
      if ('serviceWorker' in navigator) {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          log(`Service Worker 등록 ${regs.length}건 발견`);
          for (const r of regs) {
            const scope = r.scope || '(unknown)';
            try {
              const ok = await r.unregister();
              log(`  ↳ unregister ${scope}: ${ok ? 'OK' : 'fail'}`, ok ? 'ok' : 'err');
            } catch (e) {
              log(`  ↳ unregister ${scope}: 오류 ${e.message}`, 'err');
            }
          }
        } catch (e) { log(`SW 조회 실패: ${e.message}`, 'err'); }
      } else {
        log('Service Worker 미지원 브라우저');
      }

      // 2) caches storage 전부 삭제
      if (window.caches && caches.keys) {
        try {
          const keys = await caches.keys();
          log(`Cache Storage ${keys.length}건 발견`);
          for (const k of keys) {
            try {
              const ok = await caches.delete(k);
              log(`  ↳ delete '${k}': ${ok ? 'OK' : 'fail'}`, ok ? 'ok' : 'err');
            } catch (e) {
              log(`  ↳ delete '${k}': 오류 ${e.message}`, 'err');
            }
          }
        } catch (e) { log(`Cache 조회 실패: ${e.message}`, 'err'); }
      }

      // 3) sessionStorage (관리자 시크릿 제외)는 그대로 두고, localStorage의 PWA 관련만 정리
      try {
        // 알려진 PWA/팝업 관련 키만 선택 삭제
        const toDelete = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (!k) continue;
          if (k.startsWith('home_popup_hide_') ||
              k === 'promo_popup_hide_date' ||
              k.startsWith('ic_alert_dismissed_')) {
            toDelete.push(k);
          }
        }
        for (const k of toDelete) localStorage.removeItem(k);
        log(`localStorage 정리: ${toDelete.length}건 제거`, 'ok');
      } catch (e) { log(`localStorage 정리 실패: ${e.message}`, 'err'); }

      log('초기화 완료 — 3초 후 메인으로 이동합니다', 'ok');
      btn.textContent = '✓ 완료 (이동 중…)';

      setTimeout(() => {
        // hard reload to bypass any remaining caches
        location.replace('/?_reset=' + Date.now());
      }, 3000);
    }
  </script>
</body>
</html>
