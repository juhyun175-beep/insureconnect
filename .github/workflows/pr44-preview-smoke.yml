name: PR44 Preview Smoke

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      PREVIEW_BASE: https://6e0fd227.insureconnect-hub.pages.dev
      PROD_BASE: https://insureconnect.co.kr
    steps:
      - uses: actions/checkout@v4
      - name: Validate Cloudflare preview admin stats APIs
        run: node scripts/pr44-preview-smoke.mjs
