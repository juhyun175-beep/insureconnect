name: Save pending diagnosis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'perf/admin-pending-counts'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/admin-pending-counts
          fetch-depth: 0

      - name: Save compact diagnosis
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          python3 - <<'PY' > diagnostics/pending-load.txt
          from pathlib import Path
          lines = Path('admin.html').read_text(encoding='utf-8').splitlines()
          hits = [i for i, line in enumerate(lines) if 'function loadPending' in line]
          print('LOAD_PENDING_HITS', [i + 1 for i in hits])
          for i in hits:
              start = max(0, i - 10)
              end = min(len(lines), i + 230)
              print(f'--- admin.html lines {start+1}-{end} ---')
              for n in range(start, end):
                  print(f'{n+1}: {lines[n]}')
          PY
          {
            echo '--- RELATED REFERENCES ---'
            rg -n -C 2 "loadPending|status=all|status=pending|pending-count|pending_count" admin.html functions/api || true
            echo '--- LIKELY ROUTE FILES ---'
            find functions/api -type f | sort | grep -E 'recruit|lecture|meeting|pending|posting|order' || true
          } >> diagnostics/pending-load.txt

      - name: Commit diagnosis and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/pr44-preview-smoke.yml
          git add diagnostics/pending-load.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore: save pending load diagnosis'
          git push origin HEAD:perf/admin-pending-counts
