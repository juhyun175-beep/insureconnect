name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Security scan (HIGH 0 gate)
        run: |
          out=$(node scripts/security-scan.mjs 2>&1)
          echo "$out"
          high=$(echo "$out" | grep -oiP 'HIGH\s*\K\d+' || echo "-1")
          if [ "$high" != "0" ]; then
            echo "ABORT: security HIGH != 0"
            exit 1
          fi

      - name: Run tests
        run: node --test tests/*.test.js

      # v2.123.0: 인라인 JS/CSS를 해시 파일(assets/)로 외부화 — HTML ~130KB로 축소 + 자산 1년 캐시.
      # 실패 시 스크립트가 자체 롤백(인라인 폴백)하므로 배포는 계속된다.
      - name: Externalize inline JS/CSS (deploy artifact only)
        run: node scripts/externalize.mjs index.html || true

      - name: Minify HTML (deploy artifact only)
        run: |
          npx --yes html-minifier-terser@7.2.0 \
            --config-file scripts/htmlmin.json \
            index.html -o index.html || true
          npx --yes html-minifier-terser@7.2.0 \
            --config-file scripts/htmlmin.json \
            admin.html -o admin.html || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=insureconnect-hub --branch=main --commit-dirty=true

      # v2.123.0: cron 워커 동기 배포 — 카톡 발송 대기열 드레인(*/5분) 스케줄 반영.
      # CRON_SECRET(워커 시크릿)은 계정에 이미 등록되어 있어 코드 배포만으로 유지된다.
      - name: Deploy cron worker (best-effort)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: scripts/cron-worker
          command: deploy

      - name: Verify AdSense-critical static files
        run: node scripts/verify-adsense-files.mjs
